name: jdp
services:
  frontend:
    build: ./apps/trade-frontend
    ports:
      - "3000:80"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/landing:/usr/share/nginx/html/landing:ro
    depends_on:
      - api
    networks: [appnet]

  ingest:
    build: ./apps/trade-ingest
    profiles: ["trade"]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on: [kafka]
    networks: [appnet]

  shop-api:
    build: ./apps/shop-backend
    env_file: [.env]
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_HOST=postgres
      - POSTGRES_DB=app
      - POSTGRES_USER=postgres
      - SPARK_MASTER_API=http://192.168.219.108:8081
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks: [appnet]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:8000/').getcode() == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  spark-master:
    build: ./spark
    hostname: spark-master
    container_name: spark-master
    env_file: [.env]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    ports:
      - "8081:8080"
      - "7077:7077"
    networks: [appnet]
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker-1:
    build: ./spark
    depends_on: [spark-master]
    env_file: [.env]
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1536m
      - SPARK_MASTER_URL=spark://spark-master:7077
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks: [appnet]
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  spark-worker-2:
    build: ./spark
    depends_on: [spark-master]
    env_file: [.env]
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1536m
      - SPARK_MASTER_URL=spark://spark-master:7077
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks: [appnet]
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  trade-movers:
    build: ./spark
    profiles: ["trade"]
    depends_on: [spark-master, kafka, minio]
    env_file: [.env]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - SPARK_JOB_NAME=trade/movers_streaming.py
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPARK_MASTER_URL=spark://spark-master:7077
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    networks: [appnet]
    volumes:
      - ./spark/jobs:/app/jobs
      - ./spark/common:/app/common
      - ./checkpoints:/app/checkpoints
    command: ./start.sh

  shop-analytics-job:
    build: ./spark
    profiles: ["shop"]
    depends_on: [spark-master, kafka, minio]
    env_file: [.env]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - SPARK_JOB_NAME=shop/analytics_streaming.py
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPARK_MASTER_URL=spark://spark-master:7077
    networks: [appnet]
    command: ./start.sh

  shop-analytics:
    build: ./apps/shop-analytics
    ports:
      - "3001:80"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks: [appnet]
    depends_on:
      - shop-api

  api:
    build: ./apps/trade-backend
    env_file: [.env]
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/app
    volumes:
      - ./apps/trade-backend/app:/app/app
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks: [appnet]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:8000/').getcode() == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16
    env_file: [.env]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=app
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [appnet]
    ports:
      - "5432:5432"

  kafka:
    image: confluentinc/cp-kafka:latest
    env_file: [.env]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 800M
    environment:
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms512m
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    networks: [appnet]

  # --- MinIO ---
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    env_file: [.env]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks: [appnet]

  minio-init:
    image: minio/mc
    container_name: jdp-minio-init
    env_file: [.env]
    depends_on: [minio]
    environment:
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio123}
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minio} $MINIO_ROOT_PASSWORD; do
        echo 'Waiting for MinIO...'
        sleep 5
      done;
      mc mb myminio/raw --ignore-existing;
      mc mb myminio/processed --ignore-existing;
      mc mb myminio/aggregated --ignore-existing;
      mc mb myminio/iceberg-warehouse --ignore-existing;
      mc mb myminio/checklist-data || true;
      echo 'Buckets created successfully';
      exit 0;
      "
    networks: [appnet]

  # ... (omitted)

  grafana:
    image: grafana/grafana:latest
    container_name: jdp-grafana
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "3002:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    networks: [appnet]



  # --- Airflow (Batch Orchestration) ---
  airflow:
    build: ./airflow
    container_name: jdp-airflow
    restart: unless-stopped
    env_file: [.env]
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2.5G
    environment:
      - AIRFLOW__CORE__PARALLELISM=4  # Limit concurrency to prevent OOM
      - AIRFLOW__CORE__DAG_CONCURRENCY=4
      - AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG=2
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/app
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY:-jdp-secret}
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_PASSWORD:-admin}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - .:/opt/jdp
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [appnet]
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true && airflow webserver & airflow scheduler"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jdp-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./infra/tunnel:/etc/cloudflared:ro
    networks: [appnet]

volumes:
  pgdata:
  miniodata:

  airflow_logs:
  grafana-data:

networks:
  appnet:

