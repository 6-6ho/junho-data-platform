# Portfolio Landing Page (junho.in, www.junho.in)
server {
    listen 80;
    server_name junho.in www.junho.in;
    
    # Static files root for landing page
    root /usr/share/nginx/html/landing;
    index index.html;

    # Certbot support
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

# Crypto Trade Helper App (trade.junho.in)
server {
    listen 80;
    server_name trade.junho.in;
    
    # Default static files root for React App
    root /usr/share/nginx/html;
    index index.html;

    # Certbot support
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
