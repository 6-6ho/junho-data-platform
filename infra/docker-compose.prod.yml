services:
  # Override frontend to use custom Nginx config and Certbot volumes
  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/landing:/usr/share/nginx/html/landing:ro
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    restart: unless-stopped

  # Certbot service for SSL
  certbot:
    image: certbot/certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # Ensure other services restart automatically
  api:
    restart: unless-stopped
  
  ingest:
    restart: unless-stopped
    


  # Cloudflare Tunnel (directory mount to prevent file/dir issues)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jdp-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./infra/tunnel:/etc/cloudflared:ro
    networks: [appnet]


