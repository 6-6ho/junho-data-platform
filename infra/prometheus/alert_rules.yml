groups:
  - name: disk
    rules:
      - alert: DiskUsageWarning
        expr: 100 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "디스크 사용률 80% 초과"
          description: "{{ $labels.instance }} 디스크 사용률 {{ $value | printf \"%.1f\" }}%"

      - alert: DiskUsageCritical
        expr: 100 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "디스크 사용률 90% 초과 — 즉시 조치 필요"
          description: "{{ $labels.instance }} 디스크 사용률 {{ $value | printf \"%.1f\" }}%"
