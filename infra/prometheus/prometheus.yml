global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'laptop'
    static_configs:
      - targets: ['node-exporter:9100', 'cadvisor:8080']

  # Desktop node — replace <DESKTOP_IP> with actual IP or use file_sd_configs
  - job_name: 'desktop'
    static_configs:
      - targets: ['<DESKTOP_IP>:9101', '<DESKTOP_IP>:8086']
