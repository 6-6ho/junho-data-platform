# Portfolio Landing Page (6-6ho.com, www.6-6ho.com)
server {
    listen 80;
    server_name 6-6ho.com www.6-6ho.com;
    
    # Static files root for landing page
    root /usr/share/nginx/html/landing;
    index index.html;

    # Certbot support
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API proxy for landing page system status
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires -1;
        try_files $uri $uri/ =404;
    }
}

# Crypto Trade Helper App (trade.6-6ho.com)
server {
    listen 80;
    server_name trade.6-6ho.com localhost;
    
    # Default static files root for React App
    root /usr/share/nginx/html;
    index index.html;

    # Certbot support
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # SPA (Frontend) - Disable Cache for HTML
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires -1;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # API Response - Disable Cache
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires -1;
        
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name shop.6-6ho.com;

    # Use Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    location / {
        # Use variable to prevent Nginx from checking host at startup
        # Replace <DESKTOP_IP> with actual Desktop node IP
        set $target_shop http://<DESKTOP_IP>:3001;
        proxy_pass $target_shop;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

