name: Seongbuk Rental Daily

on:
  schedule:
    # 매일 08:00 KST = 23:00 UTC (전날)
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/realestate-monitor/requirements.txt

      - name: Install dependencies
        working-directory: apps/realestate-monitor
        run: pip install -r requirements.txt

      - name: Run daily notifier
        working-directory: apps/realestate-monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
