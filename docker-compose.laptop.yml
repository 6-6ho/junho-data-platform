# Laptop Node — Junho 개인 플랫폼 (todo · rag · realestate)
#
# 사용법: docker compose -f docker-compose.laptop.yml up -d
#
# 서비스 (6):
#   postgres           - 5432 (pgvector, 공유 DB: rag/realestate/todo 스키마)
#   rag-server         - 개인 RAG + MCP (rag.6-6ho.com)
#   rag-worker         - RAG 임베딩 백그라운드 워커
#   realestate-monitor - 성북구 일별 신규 매물 (6-6ho.com 메인)
#   todo               - 개인 칸반 + MCP (todo.6-6ho.com)
#   cloudflared        - Cloudflare Tunnel

name: jdp

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:

  # === Database ===
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    logging: *default-logging
    env_file: [.env]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=app
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [appnet]
    ports:
      - "5432:5432"

  # === Personal RAG + MCP server (rag.6-6ho.com) ===
  rag-server:
    build: ./apps/rag-server
    container_name: jdp-rag
    labels: ["autoheal=true"]
    restart: unless-stopped
    logging: *default-logging
    env_file: [.env]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=app
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - VOYAGE_MODEL=voyage-3-large
      - VOYAGE_DIM=1024
      - OAUTH_ISSUER=https://rag.6-6ho.com
      - RAG_JWT_SIGNING_KEY=${RAG_JWT_SIGNING_KEY:-}
      - RAG_LOGIN_TOKEN=${RAG_LOGIN_TOKEN:-}
      - RAG_ALLOWED_USER_SUB=${RAG_ALLOWED_USER_SUB:-junho}
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 384M
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:8000/health').getcode() == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      # OAuth state persistence (Phase 3) — survives container restart
      - rag-oauth-state:/data/oauth-state
      # RAG ingestion source dir — everything under /home/junho/rag-data/ on the laptop.
      # Populated by WSL→laptop rsync before each ingestion run.
      #   rag-data/claude-projects/...  Claude Code session JSONL files
      #   rag-data/jdp-docs/*.md        junho-data-platform CLAUDE.md + .claude docs + docs/*.md
      #   rag-data/plans/*.md           ~/.claude/plans (WSL) history
      - /home/junho/rag-data:/mnt/host/rag-data:ro
      - ./:/mnt/host/jdp:ro
    networks: [appnet]

  # === RAG background embedding worker ===
  # Persistent daemon that fills NULL embeddings. Priority queue places
  # manual_note chunks first (newest id), so notes saved via `add_note` become
  # semantically searchable within ~1-2s. Idle when the queue is empty (near-
  # zero API usage).
  rag-worker:
    build: ./apps/rag-server
    container_name: jdp-rag-worker
    labels: ["autoheal=true"]
    restart: unless-stopped
    logging: *default-logging
    env_file: [.env]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=app
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - VOYAGE_MODEL=voyage-3-large
      - VOYAGE_DIM=1024
      - REEMBED_BATCH=32
      - REEMBED_IDLE_SLEEP=15
      - REEMBED_BUSY_SLEEP=1
      - REEMBED_RETRY_SLEEP=10
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "/app/scripts/reembed_worker_daemon.py"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,psycopg2; psycopg2.connect(host=os.environ['DB_HOST'],port=int(os.environ.get('DB_PORT','5432')),dbname=os.environ['DB_NAME'],user=os.environ['DB_USER'],password=os.environ['DB_PASSWORD'],connect_timeout=5).cursor().execute('SELECT 1')"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s
    networks: [appnet]

  # === Realestate Monitor — 성북구 일별 신규 매물 (6-6ho.com 메인) ===
  realestate-monitor:
    build: ./apps/realestate-monitor
    container_name: jdp-realestate
    restart: unless-stopped
    logging: *default-logging
    env_file: [.env]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=app
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - ADMIN_TOKEN=${REALESTATE_ADMIN_TOKEN:-}
      - DAILY_HOUR_KST=8
      - DAILY_MINUTE_KST=0
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [appnet]

  # todo(성북반상회)는 별도 레포로 분리됨 → github.com/6-6ho/seongbuk-board
  #   /home/junho/seongbuk-board/docker-compose.laptop.yml 가 jdp_appnet 에 편승해 기동.
  #   postgres(스키마 todo)·tunnel(todo.6-6ho.com → todo:8000) 은 여기 그대로 사용.

  # === Morning Brief — 매일 06:30 KST 기술 뉴스 브리핑 (morning.6-6ho.com) ===
  morning-brief:
    build: ./apps/morning-brief
    container_name: jdp-morning
    restart: unless-stopped
    logging: *default-logging
    env_file: [.env]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=app
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - DAILY_HOUR_KST=6
      - DAILY_MINUTE_KST=30
      - ADMIN_TOKEN=${MORNING_ADMIN_TOKEN:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID:-}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET:-}
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [appnet]

  # === Hub — 6-6ho.com 랜딩 ===
  hub:
    build: ./apps/hub
    container_name: jdp-hub
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 48M
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [appnet]

  # === Autoheal — unhealthy 컨테이너 자동 재시작 (docker.sock 감시) ===
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: jdp-autoheal
    restart: unless-stopped
    logging: *default-logging
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=15
      - AUTOHEAL_START_PERIOD=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # === External Access ===
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jdp-tunnel
    restart: unless-stopped
    logging: *default-logging
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./infra/tunnel:/etc/cloudflared:ro
    networks: [appnet]
volumes:
  pgdata:
  rag-oauth-state:

networks:
  appnet:
