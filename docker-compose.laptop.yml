# Laptop Node (항상 켜짐 / Trade 풀 파이프라인 + 웹 서빙)
# 역할: Trade 데이터 수집 → 처리 → 저장 → 서빙 (독립 동작)
#
# 사용법: docker compose -f docker-compose.laptop.yml up -d
#
# 서비스 목록 (8개):
#   kafka              - 9092 (메시지 브로커)
#   ingest             - Binance WebSocket → Kafka
#   trade-movers       - Spark local mode (Movers 감지)
#   frontend (nginx)   - 3000
#   api (trade-backend) - 8000 (internal)
#   postgres           - 5432 (LAN 접근 허용)
#   grafana            - 3002
#   cloudflared        - Cloudflare Tunnel
#
# 메모리 예상: ~4G / 8G

# 메모리 예상: ~4G / 8G
name: jdp

services:
  # === Messaging ===
  kafka:
    image: confluentinc/cp-kafka:latest
    hostname: kafka
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
    environment:
      - KAFKA_HEAP_OPTS=-Xmx384m -Xms384m
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    networks: [appnet]

  # === Data Ingestion ===
  ingest:
    build: ./apps/trade-ingest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    depends_on: [kafka]
    networks: [appnet]

  # === Trade Streaming (Spark Local Mode) ===
  trade-movers:
    build: ./spark
    user: root  # Fix checkpoint permission on WSL
    depends_on: [kafka, postgres]
    env_file: [.env]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - SPARK_JOB_NAME=trade/movers_streaming.py
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - DB_HOST=postgres
      # No SPARK_MASTER_URL → defaults to local[*]
    networks: [appnet]
    volumes:
      - ./spark/jobs:/app/jobs
      - ./spark/common:/app/common
      - ./checkpoints:/app/checkpoints
    command: ./start.sh


  # === Frontend & Routing ===
  frontend:
    build: ./apps/trade-frontend
    ports:
      - "3000:80"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/landing:/usr/share/nginx/html/landing:ro
    depends_on:
      - api
    networks: [appnet]

  # === Trade API ===
  api:
    build: ./apps/trade-backend
    env_file: [.env]
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/app
      - SPARK_MASTER_API=http://192.168.219.108:8081
    volumes:
      - ./apps/trade-backend/app:/app/app
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks: [appnet]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:8000/').getcode() == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # === Database ===
  postgres:
    image: postgres:16
    env_file: [.env]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=app
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [appnet]
    ports:
      - "5432:5432"   # LAN 접근 허용 (데스크탑 → 노트북 Postgres)

  # === Monitoring UI ===
  grafana:
    image: grafana/grafana:latest
    container_name: jdp-grafana
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "3002:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    networks: [appnet]

  # === Monitoring ===
  node-exporter:
    image: prom/node-exporter:latest
    container_name: jdp-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--no-collector.filesystem'
      - '--collector.disable-defaults'
      - '--collector.cpu'
      - '--collector.meminfo'
      - '--collector.diskstats'
      - '--collector.loadavg'
      - '--collector.stat'
    pid: host
    ports:
      - "9100:9100"
    networks: [appnet]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: jdp-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks: [appnet]

  prometheus:
    image: prom/prometheus:latest
    container_name: jdp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks: [appnet]

  # === External Access ===
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jdp-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./infra/tunnel:/etc/cloudflared:ro
    networks: [appnet]

volumes:
  pgdata:
  grafana-data:

networks:
  appnet:
