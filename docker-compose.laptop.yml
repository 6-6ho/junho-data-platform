# Laptop Node (항상 켜짐 / 서버 역할)
# 역할: Serving, Ingestion, Storage
# 
# 사용법: docker compose -f docker-compose.laptop.yml up -d

services:
  # === Frontend & Routing ===
  frontend:
    build: ./apps/trade-frontend
    ports:
      - "3000:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/landing:/usr/share/nginx/html/landing:ro
    depends_on:
      - api
    networks: [appnet]

  # === APIs ===
  api:
    build: ./apps/trade-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/app
    networks: [appnet]
    depends_on: [postgres]

  shop-analytics:
    build: ./apps/shop-analytics
    container_name: shop-analytics
    depends_on: [api]
    networks: [appnet]

  # === Data Ingestion ===
  ingest:
    build: ./apps/trade-ingest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on: [kafka]
    networks: [appnet]

  # === Storage ===
  postgres:
    image: postgres:16
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    networks: [appnet]
    ports:
      - "5432:5432"

  kafka:
    image: confluentinc/cp-kafka:latest
    hostname: kafka
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      # 내부(Docker) + 외부(LAN) 듀얼 리스너
      - KAFKA_LISTENERS=INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://192.168.219.101:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    ports:
      - "9092:9092"
      - "29092:29092"
    networks: [appnet]

  # === Monitoring ===
  node-exporter:
    image: prom/node-exporter:latest
    container_name: jdp-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--no-collector.filesystem'
      - '--collector.disable-defaults'
      - '--collector.cpu'
      - '--collector.meminfo'
      - '--collector.diskstats'
      - '--collector.loadavg'
      - '--collector.stat'
    pid: host
    ports:
      - "9100:9100"
    networks: [appnet]

  prometheus:
    image: prom/prometheus:latest
    container_name: jdp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks: [appnet]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: jdp-cadvisor
    ports:
      - "8085:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks: [appnet]

  grafana:
    image: grafana/grafana:latest
    container_name: jdp-grafana
    ports:
      - "3002:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    networks: [appnet]

  # === Orchestration ===
  airflow:
    build: ./airflow
    container_name: jdp-airflow
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/app
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__WEBSERVER__SECRET_KEY=jdp-secret
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    depends_on: [postgres]
    networks: [appnet]
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true && airflow webserver & airflow scheduler"

  # === External Access ===
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jdp-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./infra/tunnel:/etc/cloudflared:ro
    networks: [appnet]

  # === Spark for Trade (Lightweight) ===
  spark-trade-runner:
    build: ./spark
    container_name: spark-trade-runner
    depends_on: [kafka]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DB_HOST=postgres
    networks: [appnet]
    command: ./start_trade.sh

volumes:
  pgdata:
  airflow_logs:
  grafana-data:

networks:
  appnet:
