<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="color-scheme" content="light dark">
<title>6-6ho</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>🏠</text></svg>">
<style>
  :root{
    --bg:#fbfaf7; --surface:#ffffff; --ink:#1b1a17; --ink2:#403d37; --muted:#8c867a;
    --line:#e9e4da; --line2:#dcd5c8; --accent:#b3261e; --kicker:#9a8f7d;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#15130f; --surface:#1c1a15; --ink:#ece7dd; --ink2:#c7c1b4; --muted:#8f887a;
      --line:#2a261f; --line2:#39342a; --accent:#e2655c; --kicker:#8f887a; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);min-height:100vh;
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .serif{font-family:Georgia,'Times New Roman',serif}
  .wrap{max-width:700px;margin:0 auto;padding:60px 22px 96px}
  .masthead{text-align:center;padding:0 0 24px;border-bottom:2px solid var(--ink);margin-bottom:8px}
  .kicker{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--kicker);font-weight:700}
  .title{font-family:Georgia,serif;font-weight:700;font-size:58px;letter-spacing:-.01em;margin:10px 0 8px;line-height:1}
  .dateline{font-size:14px;color:var(--muted)}
  .sec{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);
    margin:34px 0 14px;display:flex;align-items:center;gap:12px}
  .sec::after{content:"";flex:1;height:1px;background:var(--line2)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{display:block;text-decoration:none;color:inherit;background:var(--surface);
    border:1px solid var(--line);border-radius:14px;padding:17px 18px;
    transition:border-color .14s,transform .14s,box-shadow .14s}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);
    box-shadow:0 10px 26px -14px color-mix(in srgb,var(--accent) 60%,transparent)}
  .card .ct{font-size:17px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
  .card .ct .ar{margin-left:auto;color:var(--muted);font-weight:400;transition:transform .14s}
  .card:hover .ct .ar{color:var(--accent);transform:translateX(2px)}
  .card .cd{font-size:13.5px;color:var(--muted);margin-top:6px;line-height:1.5}
  .full{grid-column:1 / -1}
  /* 내부 도구 — 시각적으로 secondary */
  .sec.internal{color:var(--muted)}
  .tool{display:flex;align-items:center;gap:11px;text-decoration:none;color:inherit;
    padding:13px 16px;border:1px solid var(--line);border-radius:12px;background:transparent}
  .tool:hover{border-color:var(--line2);background:var(--surface)}
  .tool .tt{font-size:15px;font-weight:600}
  .tool .td{font-size:12.5px;color:var(--muted)}
  .tool .ar{margin-left:auto;color:var(--muted)}
  .tag{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--muted);
    border:1px solid var(--line2);border-radius:5px;padding:1px 6px;text-transform:uppercase}
  footer{margin-top:44px;text-align:center;font-size:12px;color:var(--muted)}
  @media (max-width:520px){ .grid{grid-template-columns:1fr} .title{font-size:44px} .wrap{padding:44px 16px 76px} }
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div class="kicker">6-6ho.com</div>
    <div class="title serif">6-6ho</div>
    <div class="dateline">작은 서비스들을 한곳에서</div>
  </header>

  <div class="sec">서비스</div>
  <div class="grid">
    <a class="card" href="https://saju.6-6ho.com/">
      <div class="ct">🐾 사주댕냥 <span class="ar">→</span></div>
      <div class="cd">반려동물 사주·운세</div>
    </a>
    <a class="card" href="https://baenae.6-6ho.com/">
      <div class="ct">✍️ 첫이름 <span class="ar">→</span></div>
      <div class="cd">아기 이름 짓기</div>
    </a>
    <a class="card" href="https://lotto.6-6ho.com/">
      <div class="ct">🎱 로또풀이 <span class="ar">→</span></div>
      <div class="cd">로또 번호 추천·분석</div>
    </a>
    <a class="card" href="https://todo.6-6ho.com/">
      <div class="ct">📋 성북반상회 <span class="ar">→</span></div>
      <div class="cd">동네 할 일 게시판</div>
    </a>
    <a class="card full" href="https://realestate.6-6ho.com/">
      <div class="ct">🏠 형범이 매물 <span class="ar">→</span></div>
      <div class="cd">형범이가 보는 성북구 신규 월세 매물</div>
    </a>
  </div>

  <div class="sec internal">내부 도구 <span class="tag">internal</span></div>
  <div class="grid">
    <a class="tool" href="https://morning.6-6ho.com/">
      <div><div class="tt">🌅 Morning Brief</div><div class="td">매일 기술 뉴스 브리핑</div></div>
      <span class="ar">→</span>
    </a>
    <a class="tool" href="https://marketing.6-6ho.com/">
      <div><div class="tt">📈 Marketing Brief</div><div class="td">매일 마케팅 인사이트</div></div>
      <span class="ar">→</span>
    </a>
  </div>

  <footer>6-6ho.com</footer>
</div>
</body>
</html>
