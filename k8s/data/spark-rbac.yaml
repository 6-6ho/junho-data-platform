# Spark RBAC вҖ” spark-submitмқҙ executor PodлҘј мғқм„ұн•  мҲҳ мһҲлҸ„лЎқ
# shop, data, airflow namespaceм—җ м Ғмҡ©
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: shop
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-role
  namespace: shop
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["create", "delete", "get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-role-binding
  namespace: shop
subjects:
- kind: ServiceAccount
  name: spark
  namespace: shop
roleRef:
  kind: Role
  name: spark-role
  apiGroup: rbac.authorization.k8s.io
---
