apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: data
  labels:
    app: minio-init
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: minio-init
    spec:
      nodeSelector:
        role: worker
      restartPolicy: OnFailure
      containers:
      - name: mc
        image: minio/mc
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-secret
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-secret
              key: MINIO_ROOT_PASSWORD
        command:
        - /bin/sh
        - -c
        - |
          until mc alias set myminio http://minio.data.svc:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
            echo 'Waiting for MinIO...'
            sleep 5
          done
          mc mb myminio/raw --ignore-existing
          mc mb myminio/processed --ignore-existing
          mc mb myminio/aggregated --ignore-existing
          mc mb myminio/iceberg-warehouse --ignore-existing
          mc mb myminio/checklist-data --ignore-existing
          echo 'Buckets created successfully'
