apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-backend
  namespace: shop
  labels:
    app: shop-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shop-backend
  template:
    metadata:
      labels:
        app: shop-backend
    spec:
      nodeSelector:
        role: worker
      containers:
      - name: backend
        image: registry.local:5000/jdp/shop-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: common-env
        - secretRef:
            name: db-secret
        - secretRef:
            name: openai-secret
        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 60
