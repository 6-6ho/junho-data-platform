# Postgres Init Scripts ConfigMap
# 이 파일은 infra/postgres-init/ 디렉토리에서 자동 생성됩니다.
#
# 생성 명령:
#   kubectl create configmap postgres-init-scripts \
#     --from-file=infra/postgres-init/ \
#     -n database --dry-run=client -o yaml > k8s/database/postgres-configmap.yaml
#
# 또는 k8s/setup.sh 스크립트를 실행하세요.
#
# 주의: 이 파일은 .gitignore에 추가하고 CI/CD에서 동적 생성하는 것을 권장합니다.
# SQL 파일이 변경될 때마다 재생성 필요합니다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: database
data: {}
# data 섹션은 setup.sh에 의해 자동으로 채워집니다
