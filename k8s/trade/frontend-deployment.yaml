apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-frontend
  namespace: trade
  labels:
    app: trade-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trade-frontend
  template:
    metadata:
      labels:
        app: trade-frontend
    spec:
      nodeSelector:
        role: control
      containers:
      - name: frontend
        image: registry.local:5000/jdp/trade-frontend:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: landing
          mountPath: /usr/share/nginx/html/landing
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: nginx-conf
        configMap:
          name: frontend-nginx-conf
      - name: landing
        hostPath:
          path: /home/junho/junho-data-platform/infra/nginx/landing
          type: Directory
