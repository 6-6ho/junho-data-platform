apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-conf
  namespace: trade
data:
  default.conf: |
    # Portfolio Landing Page (6-6ho.com, www.6-6ho.com)
    server {
        listen 80;
        server_name 6-6ho.com www.6-6ho.com;

        root /usr/share/nginx/html/landing;
        index index.html;

        location /api/ {
            proxy_pass http://trade-backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires -1;
            try_files $uri $uri/ =404;
        }
    }

    # Crypto Trade Helper App (trade.6-6ho.com)
    server {
        listen 80;
        server_name trade.6-6ho.com localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires -1;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires -1;

            proxy_pass http://trade-backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
