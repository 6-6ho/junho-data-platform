apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: airflow
  labels:
    app: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      serviceAccountName: airflow
      nodeSelector:
        role: worker
      containers:
      - name: airflow
        image: registry.local:5000/jdp/airflow:latest
        ports:
        - containerPort: 8080
          name: web
        env:
        - name: AIRFLOW__CORE__PARALLELISM
          value: "4"
        - name: AIRFLOW__CORE__DAG_CONCURRENCY
          value: "4"
        - name: AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG
          value: "2"
        - name: AIRFLOW__CORE__EXECUTOR
          value: "KubernetesExecutor"
        - name: AIRFLOW__KUBERNETES_EXECUTOR__NAMESPACE
          value: "airflow"
        - name: AIRFLOW__KUBERNETES_EXECUTOR__WORKER_CONTAINER_REPOSITORY
          value: "registry.local:5000/jdp/airflow"
        - name: AIRFLOW__KUBERNETES_EXECUTOR__WORKER_CONTAINER_TAG
          value: "latest"
        - name: AIRFLOW__KUBERNETES_EXECUTOR__DELETE_WORKER_PODS
          value: "True"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: POSTGRES_PASSWORD
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://postgres:$(POSTGRES_PASSWORD)@postgres.database.svc:5432/app"
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-secret
              key: AIRFLOW_FERNET_KEY
        - name: AIRFLOW__WEBSERVER__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-secret
              key: AIRFLOW_SECRET_KEY
        - name: AIRFLOW_PASSWORD
          valueFrom:
            secretKeyRef:
              name: airflow-secret
              key: AIRFLOW_PASSWORD
        - name: _AIRFLOW_DB_MIGRATE
          value: "true"
        - name: _AIRFLOW_WWW_USER_CREATE
          value: "true"
        - name: _AIRFLOW_WWW_USER_USERNAME
          value: "admin"
        - name: _AIRFLOW_WWW_USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: airflow-secret
              key: AIRFLOW_PASSWORD
        - name: AIRFLOW__WEBSERVER__BASE_URL
          value: "https://airflow.6-6ho.com"
        - name: AIRFLOW__API__AUTH_BACKENDS
          value: "airflow.api.auth.backend.basic_auth"
        - name: AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX
          value: "True"
        - name: AIRFLOW_CONN_POSTGRES_DEFAULT
          value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres.database.svc:5432/app"
        envFrom:
        - configMapRef:
            name: common-env
        - secretRef:
            name: telegram-secret
        - secretRef:
            name: minio-secret
        command:
        - bash
        - -c
        - |
          airflow db migrate && \
          airflow users create --username admin --password "${AIRFLOW_PASSWORD:-admin}" \
            --firstname Admin --lastname User --role Admin --email admin@example.com || true && \
          airflow webserver & airflow scheduler
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
          readOnly: true
        - name: logs
          mountPath: /opt/airflow/logs
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "1"
            memory: 1536Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
      volumes:
      - name: dags
        hostPath:
          path: /home/junho/junho-data-platform/airflow/dags
          type: Directory
      - name: logs
        emptyDir: {}
