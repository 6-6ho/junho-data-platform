# 공통 환경변수 ConfigMap — 각 namespace에 배포
# K8s ConfigMap은 namespace-scoped이므로 필요한 namespace마다 생성
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: common-env
  namespace: trade
data:
  DB_HOST: "postgres.database.svc"
  DB_PORT: "5432"
  DB_NAME: "app"
  POSTGRES_DB: "app"
  POSTGRES_USER: "postgres"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.data.svc:9092"
  S3_ENDPOINT: "http://minio.data.svc:9000"
