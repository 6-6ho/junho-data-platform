# Grafana Datasources
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc:9090
        isDefault: true
        editable: true
      - name: PostgreSQL
        type: postgres
        uid: postgres
        url: postgres.database.svc:5432
        database: app
        user: postgres
        secureJsonData:
          password: $POSTGRES_PASSWORD
        jsonData:
          database: "app"
          sslmode: "disable"
          postgresVersion: 1000
        isDefault: false
        editable: true
---
# Grafana Dashboard Provider
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  default.yml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 10
        allowUiUpdates: false
        options:
          path: /etc/grafana/provisioning/dashboards/json
---
# Grafana Dashboard JSON files
# 이 ConfigMap은 대시보드 JSON 파일에서 생성됩니다.
# 생성 명령:
#   kubectl create configmap grafana-dashboards \
#     --from-file=infra/grafana/provisioning/dashboards/json/ \
#     -n monitoring --dry-run=client -o yaml > k8s/monitoring/grafana-dashboards-generated.yaml
#
# 또는 k8s/setup.sh 스크립트를 실행하세요.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data: {}
