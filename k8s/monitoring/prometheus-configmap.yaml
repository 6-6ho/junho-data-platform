apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names: ['monitoring']
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app]
          regex: node-exporter
          action: keep
        - source_labels: [__meta_kubernetes_pod_node_name]
          target_label: node

      - job_name: 'cadvisor'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names: ['monitoring']
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app]
          regex: cadvisor
          action: keep
        - source_labels: [__meta_kubernetes_pod_node_name]
          target_label: node
